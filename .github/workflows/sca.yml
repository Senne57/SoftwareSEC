name: SCA - Dependency Review

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * 2'

jobs:
  sca:
    name: SCA Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'MODERATE,HIGH,CRITICAL'
          scanners: 'vuln'
